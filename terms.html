<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Service — INVERSSYS</title>

<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=syne:800|outfit:300,400|space-mono:400,700" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#04060f;color:#e2e8f0;font-family:'Outfit',sans-serif;line-height:1.8}

.tnav{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid #111d33}
.tnav img{height:26px}
.tnav-right{display:flex;gap:16px;align-items:center}

.lang-btn{
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  background:transparent;
  border:1px solid #1e3050;
  color:#5a6a8a;
  padding:6px 12px;
  cursor:pointer;
}

.tnav-back{color:#5a6a8a;text-decoration:none;font-size:11px}

.thero{padding:80px 40px;border-bottom:1px solid #111d33}
.thero h1{font-family:'Syne',sans-serif;font-size:40px;color:#fff}

.tbody{max-width:800px;margin:0 auto;padding:60px 40px}
.tsec{margin-bottom:40px}
.tsec h2{color:#fff;margin-bottom:10px}

.tfooter{padding:20px 40px;border-top:1px solid #111d33;font-size:12px;color:#5a6a8a}
</style>
</head>

<body>

<nav class="tnav">
  <a href="/">
    <img src="favicon.svg" alt="INVERSSYS">
  </a>

  <div class="tnav-right">
    <button id="terms-lang-btn" class="lang-btn">ES</button>
    <a href="/" class="tnav-back" id="t-back">Back</a>
  </div>
</nav>

<div class="thero">
  <h1 id="t-title">Terms of Service</h1>
  <p id="t-meta">Effective: 2026</p>
</div>

<div class="tbody">

<div class="tsec">
  <h2 id="h1">1. Scope</h2>
  <p id="s1p1">These Terms govern INVERSSYS services.</p>
</div>

<div class="tsec">
  <h2 id="h2">2. Services</h2>
  <p id="s2p1">We provide cybersecurity services.</p>
</div>

</div>

<footer class="tfooter" id="t-footer-copy">
© 2026 INVERSSYS
</footer>

<script>
let lang='en';

const cycle={en:'es',es:'fr',fr:'en'};
const btnLabel={en:'ES',es:'FR',fr:'EN'};

const T={
  en:{title:'Terms of Service',back:'Back',h1:'1. Scope',s1p1:'These Terms govern INVERSSYS services.',h2:'2. Services',s2p1:'We provide cybersecurity services.'},
  es:{title:'Términos',back:'Volver',h1:'1. Alcance',s1p1:'Estos términos rigen INVERSSYS.',h2:'2. Servicios',s2p1:'Ofrecemos servicios de ciberseguridad.'},
  fr:{title:'Conditions',back:'Retour',h1:'1. Portée',s1p1:'Ces conditions régissent INVERSSYS.',h2:'2. Services',s2p1:'Nous fournissons des services de cybersécurité.'}
};

function set(id,val){
  const el=document.getElementById(id);
  if(el) el.textContent=val;
}

function applyLang(){
  const t=T[lang];

  set('t-title',t.title);
  set('t-back',t.back);
  set('h1',t.h1);
  set('s1p1',t.s1p1);
  set('h2',t.h2);
  set('s2p1',t.s2p1);

  document.getElementById('terms-lang-btn').textContent=btnLabel[lang];
}

document.getElementById('terms-lang-btn').onclick=()=>{
  lang=cycle[lang];
  applyLang();
};

applyLang();
</script>

</body>
</html>
